# Render Blueprint — deploys the FastAPI backend + a free Postgres DB.
# Usage: in the Render dashboard click "New +" -> "Blueprint" and point it at
# this repo. Render reads this file and creates everything in one go.

databases:
  - name: passkey-db
    plan: free
    databaseName: passkey
    user: passkey

services:
  - type: web
    name: passkey-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # Filled in by you in the Render UI after the frontend is deployed.
      - key: RP_ID
        sync: false
      - key: EXPECTED_ORIGIN
        sync: false
      - key: RP_NAME
        value: PassKey

      # Auto-generated by Render (or paste your own).
      - key: VAULT_KEY
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true

      # Production cookie flags for cross-origin frontend.
      - key: SECURE_COOKIES
        value: "true"
      - key: COOKIE_SAMESITE
        value: none

      # Connect to the managed Postgres above.
      - key: DB_URL
        fromDatabase:
          name: passkey-db
          property: connectionString
